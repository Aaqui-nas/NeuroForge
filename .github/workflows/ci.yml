name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint & type check ──────────────────────────────────────────────────
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: ruff lint
        run: uv run ruff check src/ tests/

      - name: ruff format
        run: uv run ruff format --check src/ tests/

      - name: mypy
        run: uv run mypy src/

  # ── 2. Python tests + coverage ────────────────────────────────────────────
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install PySide6 system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libdbus-1-3

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: |
          mkdir -p reports htmlcov
          uv run pytest \
            --cov \
            --cov-report=html:htmlcov \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing \
            -v
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Apply NeuroForge theme to coverage report
        run: uv run python scripts/theme_reports.py htmlcov
        if: always()

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            reports/
            htmlcov/
          retention-days: 30

  # ── 3. C++ tests ──────────────────────────────────────────────────────────
  test-cpp:
    name: C++ tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get install -y cmake g++ clang-format

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python deps (pybind11 headers)
        run: uv sync

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run C++ tests
        run: cd build && ctest --output-on-failure

  # ── 4. Deploy docs + reports to GitHub Pages ──────────────────────────────
  publish:
    name: Publish docs & reports
    needs: [lint, test-python, test-cpp]
    # Toujours publier sur main, même si les jobs précédents ont échoué
    # (sauf annulation manuelle du workflow)
    if: |
      always() &&
      needs.test-python.result != 'cancelled' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: _artifacts/
        continue-on-error: true

      - name: Build MkDocs site
        run: uv run mkdocs build

      - name: Copy coverage report into site
        run: |
          if [ -d "_artifacts/htmlcov" ]; then
            cp -r _artifacts/htmlcov site/coverage
          else
            mkdir -p site/coverage
            echo "<p>Coverage report not available for this run.</p>" > site/coverage/index.html
          fi

      - name: Copy test report into site
        run: |
          if [ -d "_artifacts/reports" ]; then
            cp -r _artifacts/reports site/reports
          else
            mkdir -p site/reports
            echo "<p>Test report not available for this run.</p>" > site/reports/index.html
          fi

      - name: Install graphify
        run: uv tool install graphifyy
        continue-on-error: true

      - name: Regenerate knowledge graph
        run: graphify update .
        continue-on-error: true

      - name: Apply NeuroForge theme to graph
        run: uv run python scripts/theme_reports.py graphify-out
        continue-on-error: true

      - name: Publish knowledge graph
        run: |
          if [ -d "graphify-out" ]; then
            mkdir -p site/graph
            cp -r graphify-out/. site/graph/
            echo "Graph published ($(ls graphify-out | wc -l) files)"
          else
            echo "No graphify-out directory found, skipping graph publication"
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - id: deploy
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
